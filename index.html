<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WorkForce Ai</title>

<style>

body{
margin:0;
font-family:Inter,Segoe UI;
background:#0a0d1f;
color:white;
overflow:hidden;
}

/* Aurora Title */

.aurora{
background:linear-gradient(90deg,#3b82f6,#ec4899,#3b82f6);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:aurora 6s linear infinite;
}

@keyframes aurora{
0%{background-position:0%}
100%{background-position:200%}
}

/* Top nav */

.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
background:#060915;
border-bottom:1px solid #1b2140;
}

.nav{
display:flex;
gap:25px;
}

.nav div{
cursor:pointer;
opacity:.7;
}

.nav div:hover{
opacity:1;
}

/* Layout */

.main{
display:flex;
height:calc(100vh - 60px);
}

/* Sidebar */

.sidebar{
width:240px;
background:#070b1c;
border-right:1px solid #1b2140;
padding:20px;
overflow:auto;
}

/* Canvas */

.canvas{
flex:1;
background:#0e1330;
padding:20px;
overflow:auto;
}

/* Toolbox */

.toolbox{
width:200px;
background:#070b1c;
border-right:1px solid #1b2140;
padding:20px;
}

.block{
background:#1c2245;
padding:10px;
margin-bottom:10px;
border-radius:6px;
cursor:grab;
}

/* AI room */

.airoom{
height:150px;
background:#101740;
position:relative;
}

/* AI agents */

.ai{
position:absolute;
width:45px;
transition:1s;
}

/* Chat */

.chat{
width:300px;
background:#070b1c;
border-left:1px solid #1b2140;
display:flex;
flex-direction:column;
}

.chatlog{
flex:1;
overflow:auto;
padding:10px;
}

.chatinput{
display:flex;
}

.chatinput input{
flex:1;
padding:10px;
background:#0f1435;
border:none;
color:white;
}

.chatinput button{
width:80px;
border:none;
background:linear-gradient(90deg,#3b82f6,#ec4899);
color:white;
}

/* Commit timeline */

.commit{
background:#141a35;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

/* Inbox */

.email{
background:#141a35;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="topbar">

<h2 class="aurora">AI Workforce Pro</h2>

<div class="nav">
<div>Dashboard</div>
<div>Workspace</div>
<div>Pages</div>
<div>Workforce</div>
<div>Inbox</div>
<div>Commits</div>
</div>

</div>

<div class="main">

<!-- Blocks -->

<div class="toolbox">

<h3>Sections</h3>

<div class="block" draggable="true" ondragstart="drag(event,'hero')">Hero</div>
<div class="block" draggable="true" ondragstart="drag(event,'features')">Features</div>
<div class="block" draggable="true" ondragstart="drag(event,'gallery')">Gallery</div>
<div class="block" draggable="true" ondragstart="drag(event,'contact')">Contact</div>

<h3>AI Builder</h3>

<input id="prompt" placeholder="Describe your website">
<button onclick="generate()">Generate</button>

</div>

<!-- Canvas -->

<div class="canvas" id="canvas"
ondrop="drop(event)"
ondragover="allowDrop(event)">

<h2>Website Canvas</h2>

</div>

<!-- AI workspace -->

<div class="sidebar">

<h3>AI Workforce</h3>

<div class="airoom" id="airoom"></div>

<h3>Git Commits</h3>

<div id="commits"></div>

<h3>Inbox</h3>

<div id="inbox"></div>

<button onclick="exportSite()">Export Website</button>

</div>

<!-- Chat -->

<div class="chat">

<div class="chatlog" id="chatlog"></div>

<div class="chatinput">
<input id="chatmsg">
<button onclick="chat()">Send</button>
</div>

</div>

</div>

<script>

/* Drag builder */

function allowDrop(e){e.preventDefault()}

function drag(e,type){
e.dataTransfer.setData("type",type)
}

function drop(e){

e.preventDefault()

let type=e.dataTransfer.getData("type")

let el=document.createElement("div")

if(type=="hero")
el.innerHTML="<h1>Hero Section</h1><p>Welcome</p>"

if(type=="features")
el.innerHTML="<h2>Features</h2><ul><li>Fast</li><li>Modern</li></ul>"

if(type=="gallery")
el.innerHTML="<h2>Gallery</h2><img src='https://picsum.photos/300'>"

if(type=="contact")
el.innerHTML="<h2>Contact</h2>Email us"

canvas.appendChild(el)

commit("Added "+type+" section")

}

/* AI agents */

const agents=[
"https://cdn-icons-png.flaticon.com/512/4140/4140048.png",
"https://cdn-icons-png.flaticon.com/512/4140/4140061.png",
"https://cdn-icons-png.flaticon.com/512/4149/4149677.png",
"https://cdn-icons-png.flaticon.com/512/921/921347.png"
]

function spawnAgents(){

let room=document.getElementById("airoom")

agents.forEach((src,i)=>{

let ai=document.createElement("img")

ai.src=src

ai.className="ai"

ai.style.left=(i*50)+"px"
ai.style.top="40px"

room.appendChild(ai)

setInterval(()=>{

ai.style.left=Math.random()*150+"px"
ai.style.top=Math.random()*90+"px"

},3000)

})

}

spawnAgents()

/* AI generator */

function generate(){

let prompt=document.getElementById("prompt").value

canvas.innerHTML=""

let hero=document.createElement("div")
hero.innerHTML="<h1>"+prompt+"</h1>"

let features=document.createElement("div")
features.innerHTML="<h2>Features</h2><p>Fast modern website</p>"

let contact=document.createElement("div")
contact.innerHTML="<h2>Contact</h2>Email contact@example.com"

canvas.appendChild(hero)
canvas.appendChild(features)
canvas.appendChild(contact)

commit("AI generated website")

email("AI Builder","Site created from prompt")

}

/* Chat */

function chat(){

let msg=document.getElementById("chatmsg").value

log("You: "+msg)

if(msg.includes("add blog")){

let blog=document.createElement("div")

blog.innerHTML="<h2>Blog</h2><p>Latest posts</p>"

canvas.appendChild(blog)

commit("Blog page added")

email("Content AI","Blog section created")

}

}

/* Logs */

function log(t){

let div=document.createElement("div")

div.innerText=t

chatlog.appendChild(div)

}

/* Commits */

function commit(msg){

let div=document.createElement("div")

div.className="commit"

div.innerText=msg

commits.prepend(div)

}

/* Inbox */

function email(title,msg){

let div=document.createElement("div")

div.className="email"

div.innerHTML="<b>"+title+"</b><br>"+msg

inbox.prepend(div)

}

/* Export */

function exportSite(){

let html=canvas.innerHTML

let file=`<html><body>${html}</body></html>`

let blob=new Blob([file],{type:"text/html"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="website.html"

a.click()

}

</script>

</body>
</html>
