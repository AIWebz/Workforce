<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Workforce</title>
<style>
body { margin:0; font-family:'Comic Sans MS', cursive,sans-serif; display:flex; height:100vh; overflow:hidden; background:#f0f4f8; color:#1f2937;}
.sidebar{width:220px; background:#e0e7ff; padding:20px; border-right:4px solid #c7d2fe; border-radius:0 20px 20px 0; box-shadow:4px 0 10px rgba(0,0,0,0.05);}
.sidebar h2{margin-top:0;}
.sidebar li{list-style:none; padding:10px 0; cursor:pointer; border-radius:8px; transition:0.3s;}
.sidebar li:hover{background:#c7d2fe; color:#1e3a8a;}
.main{flex:1; padding:20px; overflow:auto; position:relative;}
.main h1{color:#4338ca;}
textarea,input[type=text]{width:100%; background:#f3f4f6; border:none; padding:12px; border-radius:12px; margin-top:10px; font-size:14px;}
button{background:#a78bfa; color:white; border:none; padding:10px 20px; margin-top:10px; cursor:pointer; border-radius:12px; font-weight:bold; box-shadow:2px 2px 6px rgba(0,0,0,0.1); transition:0.3s;}
button:hover{transform:scale(1.05); background:#8b5cf6;}
.rightpanel{width:300px; background:#e0f2fe; padding:20px; border-left:4px solid #93c5fd; border-radius:20px 0 0 20px; overflow:auto;}
h3{margin-bottom:5px;}
.employee-card{display:flex; align-items:center; background:#ede9fe; border-radius:16px; margin-top:10px; padding:5px 10px; font-size:14px; justify-content:space-between; transition:0.3s; position:relative;}
.employee-card img.avatar{width:40px; height:40px; border-radius:50%; margin-right:10px; position:absolute;}
#workspace{position:relative; width:100%; height:200px; background:#fff5f3; border-radius:12px; margin-top:20px; overflow:hidden; border:2px solid #fcd5ce;}
.selectable-roles{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.role-card{background:#dbeafe; padding:5px 10px; border-radius:12px; cursor:pointer; font-size:13px; transition:0.3s;}
.role-card.selected{background:#818cf8; color:white;}
.slider{width:100%;margin-top:10px;}
.preview{background:white; color:black; padding:20px; margin-top:20px; border-radius:16px; box-shadow:0 5px 10px rgba(0,0,0,0.05);}
.chat{position:fixed; bottom:10px; left:240px; right:320px; background:#e0f2fe; padding:10px; display:flex; border-radius:12px;}
.chat input{flex:1; padding:10px; border-radius:12px; border:none;}
#inbox{background:#fff3f8; padding:10px; border-radius:12px; max-height:150px; overflow:auto; margin-top:10px;}
.inbox-email{background:#fce7f3; padding:5px 10px; border-radius:8px; margin-bottom:5px; font-size:12px; cursor:pointer;}
.inbox-email:hover{background:#fbb6ce;}
</style>
</head>
<body>
<div class="sidebar">
<h2>Workforces</h2>
<ul id="workforceList"></ul>
<button onclick="createWorkforcePrompt()">+ Create Workforce</button>
</div>
<div class="main">
<h1>Chibi AI Website Builder</h1>
<div id="createWorkforceSection">
<p>Name your Workforce:</p>
<input type="text" id="workforceName" placeholder="e.g. Coffee Shop Team">
<button onclick="createWorkforce()">Create Workforce</button>
</div>
<div id="setupWorkforceSection" style="display:none;">
<h3>Configure Workforce</h3>
<label>Number of Employees:</label>
<input type="range" min="1" max="10" value="3" id="employeeCount" class="slider">
<p id="employeeCountText">3 employees selected</p>
<h3>Select Employee Roles:</h3>
<div class="selectable-roles" id="roleSelection"></div>
<h3>Website Prompt:</h3>
<textarea id="websitePrompt" placeholder="Describe the website for your AI workforce"></textarea>
<button onclick="buildWebsite()">Build Website</button>
</div>
<h3>Manage Employees</h3>
<div id="employees"></div>
<h3>Workspace</h3>
<div id="workspace"></div>
<h3>Inbox</h3>
<div id="inbox"></div>
<div id="preview"></div>
<button onclick="downloadWebsite()">Download Website</button>
</div>
<div class="rightpanel">
<h3>Activity Log</h3>
<div id="activity"></div>
</div>
<div class="chat">
<input id="chatInput" placeholder="Command your AI workforce...">
<button onclick="chat()">Send</button>
</div>

<script>
let workforces=[], selectedWorkforce=null, websiteData={}
const rolesList=["AI Website Builder","AI Designer","AI Content Writer","AI SEO Specialist","AI Marketing Assistant","AI Analytics Manager","AI Support Agent"]
const avatars=[
"https://i.ibb.co/0j0kq4F/chibi1.png",
"https://i.ibb.co/bWP0fRk/chibi2.png",
"https://i.ibb.co/yfF3Y3r/chibi3.png",
"https://i.ibb.co/Khb2bZf/chibi4.png",
"https://i.ibb.co/qD0WvVH/chibi5.png",
"https://i.ibb.co/6Xb3Yf2/chibi6.png",
"https://i.ibb.co/FHkYq7x/chibi7.png",
"https://i.ibb.co/Kq8y3F6/chibi8.png"
]

// === Workforce Management ===
function createWorkforcePrompt(){
document.getElementById("createWorkforceSection").style.display="block"
document.getElementById("setupWorkforceSection").style.display="none"
document.getElementById("workforceName").value=""
}
function createWorkforce(){
let name=document.getElementById("workforceName").value.trim()
if(!name){alert("Enter a workforce name"); return;}
let workforce={name:name,id:Date.now(),employees:[],roles:[],inbox:[]}
workforces.push(workforce)
selectedWorkforce=workforce
updateWorkforceList()
setupWorkforceUI()
}
function updateWorkforceList(){
let list=document.getElementById("workforceList")
list.innerHTML=""
workforces.forEach(wf=>{
let li=document.createElement("li")
li.innerText=wf.name
li.onclick=()=>selectWorkforce(wf.id)
list.appendChild(li)
})
}
function selectWorkforce(id){
selectedWorkforce=workforces.find(w=>w.id===id)
setupWorkforceUI()
}
function setupWorkforceUI(){
document.getElementById("createWorkforceSection").style.display="none"
document.getElementById("setupWorkforceSection").style.display="block"
document.getElementById("employeeCount").value=selectedWorkforce.employees.length || 3
document.getElementById("employeeCountText").innerText=(selectedWorkforce.employees.length || 3)+" employees selected"
let container=document.getElementById("roleSelection")
container.innerHTML=""
rolesList.forEach(role=>{
let card=document.createElement("div")
card.className="role-card"
card.innerText=role
if(selectedWorkforce.roles.includes(role))card.classList.add("selected")
card.onclick=()=>{
if(selectedWorkforce.roles.includes(role)){
selectedWorkforce.roles=selectedWorkforce.roles.filter(r=>r!==role)
card.classList.remove("selected")
}else{
selectedWorkforce.roles.push(role)
card.classList.add("selected")
}}
container.appendChild(card)
})
}
document.getElementById("employeeCount").oninput=function(){
let count=this.value
document.getElementById("employeeCountText").innerText=count+" employees selected"
}
function log(text){
let div=document.createElement("div")
div.className="employee-card"
div.innerText=text
document.getElementById("activity").prepend(div)
}
function inboxLog(text,details){
let div=document.createElement("div")
div.className="inbox-email"
div.innerText=text
div.onclick=()=>alert(details)
document.getElementById("inbox").prepend(div)
if(selectedWorkforce) selectedWorkforce.inbox.push({text:text,details:details})
}

// === Build Website with animated workspace ===
function buildWebsite(){
if(!selectedWorkforce){alert("Select a workforce"); return;}
let description=document.getElementById("websitePrompt").value.trim()
if(!description){alert("Enter website prompt"); return;}
let count=parseInt(document.getElementById("employeeCount").value)
selectedWorkforce.employees=[]
let workspace=document.getElementById("workspace")
workspace.innerHTML=""
for(let i=0;i<count;i++){
let role=selectedWorkforce.roles[i % selectedWorkforce.roles.length] || rolesList[i % rolesList.length]
let avatar=avatars[i % avatars.length]
let emp={role:role,status:"working",avatar:avatar,x:Math.random()*180,y:Math.random()*140,dx:(Math.random()*2+1)*(Math.random()<0.5?-1:1),dy:(Math.random()*2+1)*(Math.random()<0.5?-1:1)}
selectedWorkforce.employees.push(emp)
let img=document.createElement("img")
img.src=avatar
img.className="avatar"
img.style.left=emp.x+"px"
img.style.top=emp.y+"px"
workspace.appendChild(img)
emp.img=img
inboxLog(role+" started working","Initial task started for "+role)
}
renderEmployees()
animateWorkspace()
generateWebsite(description)
}

// Animate workspace
function animateWorkspace(){
let workspace=document.getElementById("workspace")
selectedWorkforce.employees.forEach(emp=>{
function move(){
emp.x+=emp.dx
emp.y+=emp.dy
if(emp.x<0||emp.x>workspace.clientWidth-40) emp.dx*=-1
if(emp.y<0||emp.y>workspace.clientHeight-40) emp.dy*=-1
emp.img.style.left=emp.x+"px"
emp.img.style.top=emp.y+"px"
requestAnimationFrame(move)
}
move()
})
}

// Display employees in manage section
function renderEmployees(){
let empContainer=document.getElementById("employees")
empContainer.innerHTML="<h3>Employees:</h3>"
selectedWorkforce.employees.forEach(e=>{
let div=document.createElement("div")
div.className="employee-card"
div.innerHTML=`<b>${e.role}</b> Status: ${e.status}`
empContainer.appendChild(div)
})
}

// Generate multi-page website content
function generateWebsite(prompt){
websiteData.html=`<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>${selectedWorkforce.name}</title>
<style>
body{font-family:'Comic Sans MS', cursive,sans-serif;margin:0;padding:20px;background:#f0f4f8;color:#1f2937;}
nav ul{list-style:none;display:flex;gap:20px;background:#e0e7ff;padding:10px;border-radius:12px;justify-content:center;}
nav li{padding:5px 10px;border-radius:8px;cursor:pointer;}
nav li:hover{background:#c7d2fe;}
section{margin-top:20px;background:#ede9fe;padding:15px;border-radius:12px;box-shadow:2px 2px 8px rgba(0,0,0,0.1);}
</style></head><body>
<h1>${prompt}</h1>
<nav><ul><li>Home</li><li>About</li><li>Services</li><li>Blog</li><li>Contact</li></ul></nav>
<section><h2>About</h2><p>This content was generated by the ${selectedWorkforce.name} AI workforce to describe your project.</p></section>
<section><h2>Services</h2><p>AI-generated services content tailored from your prompt: "${prompt}".</p></section>
<section><h2>Blog</h2><p>Sample blog post: "${prompt}".</p></section>
<section><h2>Contact</h2><p>Email: contact@example.com | Form Placeholder</p></section>
</body></html>`
document.getElementById("preview").innerHTML=`<div class="preview"><h1>Website Preview</h1><p>${prompt}</p></div>`
}

// Download
function downloadWebsite(){
if(!websiteData.html){alert("Build website first"); return;}
let a=document.createElement("a")
let blob=new Blob([websiteData.html],{type:"text/html"})
a.href=URL.createObjectURL(blob)
a.download=selectedWorkforce.name.replace(/\s+/g,"_")+".html"
a.click()
log("Website ready for download!")
}

// Chat commands
function chat(){
let cmd=document.getElementById("chatInput").value.toLowerCase()
if(cmd.includes("contact")){inboxLog("AI Builder added Contact Section","Contact section added")}
else if(cmd.includes("blog")){inboxLog("AI Content Writer added Blog","New blog section added")}
else if(cmd.includes("color")){inboxLog("AI Designer changed background color","Background color changed to pink")}
else{inboxLog("Command processed: "+cmd,"Generic command")}
document.getElementById("chatInput").value=""
}
</script>
</body>
</html>
