<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Workforce</title>

<style>

body{
margin:0;
font-family:Inter,Segoe UI;
background:#0b0f1f;
color:white;
overflow:hidden;
}

/* Aurora Title */

.aurora{
background:linear-gradient(90deg,#3b82f6,#ec4899,#3b82f6);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:aurora 6s linear infinite;
}

@keyframes aurora{
0%{background-position:0%}
100%{background-position:200%}
}

/* Pages */

.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* Inputs */

input{
padding:12px;
width:300px;
margin:10px;
border:none;
border-radius:6px;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#3b82f6,#ec4899);
color:white;
cursor:pointer;
}

/* Main App */

#app{
display:none;
height:100vh;
flex-direction:column;
}

/* Topbar */

.topbar{
height:60px;
background:#070a16;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid #1e233a;
}

.nav{
display:flex;
gap:25px;
}

/* Layout */

.main{
display:flex;
flex:1;
}

/* Sidebar */

.sidebar{
width:230px;
background:#070a16;
padding:20px;
border-right:1px solid #1e233a;
overflow:auto;
}

/* Canvas */

.canvas{
flex:1;
background:#0e1327;
padding:20px;
overflow:auto;
}

/* Preview */

.preview{
width:350px;
background:#0c1024;
border-left:1px solid #1e233a;
padding:10px;
}

/* AI room */

.airoom{
height:120px;
background:#101740;
position:relative;
margin-bottom:20px;
}

.ai{
position:absolute;
width:40px;
transition:1s;
}

/* Commit */

.commit{
background:#141a35;
padding:10px;
margin-bottom:8px;
border-radius:6px;
}

/* Email */

.email{
background:#141a35;
padding:10px;
margin-bottom:8px;
border-radius:6px;
}

</style>
</head>

<body>

<!-- Prompt Page -->

<div id="promptPage" class="page active">

<h1 class="aurora">Build Your AI Website</h1>

<input id="sitePrompt" placeholder="Describe your website">

<button onclick="goLogin()">Generate Website</button>

</div>

<!-- Login Page -->

<div id="loginPage" class="page">

<h2>Sign in to Continue</h2>

<input id="email" placeholder="Email">

<button onclick="login()">Sign in with Email</button>

<button onclick="login()">Sign in with Google</button>

</div>

<!-- App -->

<div id="app">

<div class="topbar">

<h3 class="aurora">AI Workforce</h3>

<div class="nav">

<div>Dashboard</div>
<div>Pages</div>
<div>Workforce</div>
<div>Inbox</div>
<div>Commits</div>

</div>

</div>

<div class="main">

<div class="sidebar">

<h3>AI Workforce</h3>

<div class="airoom" id="airoom"></div>

<h3>Inbox</h3>

<div id="inbox"></div>

<h3>Commits</h3>

<div id="commits"></div>

<button onclick="exportSite()">Export Website</button>

</div>

<div class="canvas" id="canvas">

<h2>Generating Website...</h2>

</div>

<div class="preview">

<h3>Live Preview</h3>

<iframe id="previewFrame" style="width:100%;height:90%;border:none;background:white"></iframe>

</div>

</div>

</div>

<script>

/* Page flow */

function goLogin(){

document.getElementById("promptPage").classList.remove("active")
document.getElementById("loginPage").classList.add("active")

}

function login(){

document.getElementById("loginPage").classList.remove("active")
document.getElementById("app").style.display="flex"

generateSite()

}

/* AI agents */

const employees=[

{name:"Designer",icon:"https://cdn-icons-png.flaticon.com/512/4140/4140048.png"},
{name:"Developer",icon:"https://cdn-icons-png.flaticon.com/512/4140/4140061.png"},
{name:"Writer",icon:"https://cdn-icons-png.flaticon.com/512/4149/4149677.png"},
{name:"SEO",icon:"https://cdn-icons-png.flaticon.com/512/921/921347.png"}

]

function spawnAgents(){

let room=document.getElementById("airoom")

employees.forEach((e,i)=>{

let ai=document.createElement("img")

ai.src=e.icon
ai.className="ai"

ai.style.left=(i*50)+"px"
ai.style.top="40px"

room.appendChild(ai)

setInterval(()=>{

ai.style.left=Math.random()*160+"px"
ai.style.top=Math.random()*60+"px"

},3000)

})

}

spawnAgents()

/* AI site generation */

function generateSite(){

let prompt=document.getElementById("sitePrompt").value

canvas.innerHTML=""

let hero=document.createElement("div")
hero.innerHTML="<h1>"+prompt+"</h1>"

let about=document.createElement("div")
about.innerHTML="<h2>About</h2><p>Generated content</p>"

let contact=document.createElement("div")
contact.innerHTML="<h2>Contact</h2>contact@email.com"

canvas.appendChild(hero)
canvas.appendChild(about)
canvas.appendChild(contact)

commit("AI generated website")
email("AI Builder","Website generated")

updatePreview()

}

/* Preview */

function updatePreview(){

let html=canvas.innerHTML

previewFrame.srcdoc="<html><body>"+html+"</body></html>"

}

/* Commit */

function commit(msg){

let div=document.createElement("div")
div.className="commit"
div.innerText=msg

commits.prepend(div)

}

/* Inbox */

function email(title,msg){

let div=document.createElement("div")

div.className="email"

div.innerHTML="<b>"+title+"</b><br>"+msg

inbox.prepend(div)

}

/* Export */

function exportSite(){

let html=canvas.innerHTML

let file="<html><body>"+html+"</body></html>"

let blob=new Blob([file],{type:"text/html"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="website.html"

a.click()

}

</script>

</body>
</html>
