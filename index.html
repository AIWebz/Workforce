<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Workforce Website Builder - Immersive</title>
<style>
/* === Reset & Fonts === */
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif;}
body {display:flex; height:100vh; background:#f4f6f8; color:#1f2937; overflow:hidden;}

/* === Sidebar === */
.sidebar {
  width:240px;
  background:#ffffff;
  border-right:1px solid #e2e8f0;
  padding:20px;
  display:flex;
  flex-direction:column;
}
.sidebar h2{margin-bottom:10px;color:#4f46e5;}
.sidebar ul{list-style:none;padding:0;margin:0;flex:1;overflow-y:auto;}
.sidebar li{
  padding:10px; cursor:pointer; border-radius:8px; margin-bottom:5px;
  transition:0.2s; display:flex;align-items:center;
}
.sidebar li:hover{background:#eef2ff;}

/* === Main Content === */
.main {flex:1; display:flex; flex-direction:column; overflow:hidden;}

/* === Top Nav === */
.topnav{
  height:60px;
  background:#4f46e5;
  color:white;
  display:flex;
  align-items:center;
  padding:0 20px;
  font-weight:bold;
  font-size:18px;
  flex-shrink:0;
}

/* === Content Area === */
.content {display:flex; flex:1; overflow:hidden;}

/* === Workspace Section === */
.workspace {flex:2; padding:20px; overflow:auto; background:#f9fafb; position:relative; border-right:1px solid #e2e8f0; border-radius:0;}
#workspaceArea {position:relative; width:100%; height:300px; background:#f3f4f6; border-radius:12px; border:1px solid #e5e7eb; overflow:hidden; margin-top:10px;}
.workspace img.avatar {position:absolute; width:50px; height:50px; border-radius:50%; transition:0.3s;}

/* === Right Panel === */
.rightpanel {width:300px; background:#ffffff; border-left:1px solid #e2e8f0; padding:20px; overflow-y:auto;}
.employee-card{display:flex;align-items:center;background:#eef2ff;border-radius:12px;padding:5px 10px;margin-bottom:10px;font-size:14px;justify-content:space-between;position:relative;}
.employee-card img.avatar{width:40px;height:40px;border-radius:50%;margin-right:10px;}

/* === Inputs & Buttons === */
textarea,input[type=text]{width:100%; background:#f3f4f6; border:none; padding:10px; border-radius:8px; margin-top:10px; font-size:14px;}
button{background:#4f46e5;color:white;border:none;padding:10px 20px;border-radius:8px;margin-top:10px;cursor:pointer;transition:0.2s;font-weight:bold;}
button:hover{background:#6366f1;}
.slider{width:100%;margin-top:10px;}
.selectable-roles{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.role-card{padding:5px 10px;border-radius:12px;background:#e0e7ff;cursor:pointer;font-size:13px;transition:0.2s;}
.role-card.selected{background:#4f46e5;color:white;}

/* === Inbox === */
#inbox{background:#fff1f3;padding:10px;border-radius:12px;max-height:180px;overflow:auto;margin-top:10px;}
.inbox-email{background:#fce7f3;padding:5px 10px;border-radius:8px;margin-bottom:5px;font-size:12px;cursor:pointer;}
.inbox-email:hover{background:#fbb6ce;}

/* === Website Preview === */
#previewContainer {background:white;padding:10px;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-top:10px; height:400px; overflow:auto;}
iframe {width:100%; height:100%; border:none; border-radius:12px;}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>Workforces</h2>
<ul id="workforceList"></ul>
<button onclick="createWorkforcePrompt()">+ Create Workforce</button>
</div>

<!-- Main -->
<div class="main">
<div class="topnav">AI Workforce Website Builder</div>
<div class="content">
<div class="workspace">
<!-- Create Workforce -->
<div id="createWorkforceSection">
<p>Name your Workforce:</p>
<input type="text" id="workforceName" placeholder="Team Name">
<button onclick="createWorkforce()">Create Workforce</button>
</div>

<!-- Setup Workforce -->
<div id="setupWorkforceSection" style="display:none;">
<h3>Configure Workforce</h3>
<label>Number of Employees:</label>
<input type="range" min="1" max="10" value="3" id="employeeCount" class="slider">
<p id="employeeCountText">3 employees selected</p>
<h3>Select Employee Roles:</h3>
<div class="selectable-roles" id="roleSelection"></div>
<h3>Website Prompt:</h3>
<textarea id="websitePrompt" placeholder="Describe your website"></textarea>
<button onclick="buildWebsite()">Build Website</button>
</div>

<!-- Employee Management -->
<h3>Employees</h3>
<div id="employees"></div>

<!-- Workspace Animated Area -->
<h3>Workspace</h3>
<div id="workspaceArea"></div>

<!-- Inbox -->
<h3>Inbox</h3>
<div id="inbox"></div>

<!-- Website Preview -->
<h3>Website Preview</h3>
<div id="previewContainer"><iframe id="websitePreview"></iframe></div>
<button onclick="downloadWebsite()">Download Website</button>
</div>

<!-- Right Panel -->
<div class="rightpanel">
<h3>Activity Log</h3>
<div id="activity"></div>
</div>
</div>
</div>

<script>
// === Core Data ===
let workforces=[], selectedWorkforce=null, websiteData={}
const rolesList=["AI Website Builder","AI Designer","AI Content Writer","AI SEO Specialist","AI Marketing Assistant","AI Analytics Manager","AI Support Agent"]
const avatars=[
"https://i.ibb.co/0j0kq4F/chibi1.png",
"https://i.ibb.co/bWP0fRk/chibi2.png",
"https://i.ibb.co/yfF3Y3r/chibi3.png",
"https://i.ibb.co/Khb2bZf/chibi4.png",
"https://i.ibb.co/qD0WvVH/chibi5.png",
"https://i.ibb.co/6Xb3Yf2/chibi6.png",
"https://i.ibb.co/FHkYq7x/chibi7.png",
"https://i.ibb.co/Kq8y3F6/chibi8.png"
]

// === Workforce Management ===
function createWorkforcePrompt(){
document.getElementById("createWorkforceSection").style.display="block"
document.getElementById("setupWorkforceSection").style.display="none"
document.getElementById("workforceName").value=""
}
function createWorkforce(){
let name=document.getElementById("workforceName").value.trim()
if(!name){alert("Enter a workforce name"); return;}
let workforce={name:name,id:Date.now(),employees:[],roles:[],inbox:[]}
workforces.push(workforce)
selectedWorkforce=workforce
updateWorkforceList()
setupWorkforceUI()
}
function updateWorkforceList(){
let list=document.getElementById("workforceList")
list.innerHTML=""
workforces.forEach(wf=>{
let li=document.createElement("li")
li.innerText=wf.name
li.onclick=()=>selectWorkforce(wf.id)
list.appendChild(li)
})
}
function selectWorkforce(id){
selectedWorkforce=workforces.find(w=>w.id===id)
setupWorkforceUI()
}
function setupWorkforceUI(){
document.getElementById("createWorkforceSection").style.display="none"
document.getElementById("setupWorkforceSection").style.display="block"
document.getElementById("employeeCount").value=selectedWorkforce.employees.length || 3
document.getElementById("employeeCountText").innerText=(selectedWorkforce.employees.length || 3)+" employees selected"
let container=document.getElementById("roleSelection")
container.innerHTML=""
rolesList.forEach(role=>{
let card=document.createElement("div")
card.className="role-card"
card.innerText=role
if(selectedWorkforce.roles.includes(role))card.classList.add("selected")
card.onclick=()=>{
if(selectedWorkforce.roles.includes(role)){
selectedWorkforce.roles=selectedWorkforce.roles.filter(r=>r!==role)
card.classList.remove("selected")
}else{
selectedWorkforce.roles.push(role)
card.classList.add("selected")
}}
container.appendChild(card)
})
}
document.getElementById("employeeCount").oninput=function(){
let count=this.value
document.getElementById("employeeCountText").innerText=count+" employees selected"
}

// === Logging ===
function log(text){
let div=document.createElement("div")
div.innerText=text
document.getElementById("activity").prepend(div)
}
function inboxLog(text,details){
let div=document.createElement("div")
div.className="inbox-email"
div.innerText=text
div.onclick=()=>alert(details)
document.getElementById("inbox").prepend(div)
if(selectedWorkforce) selectedWorkforce.inbox.push({text,text,details})
}

// === Build Website & Animate Workspace ===
function buildWebsite(){
if(!selectedWorkforce){alert("Select a workforce"); return;}
let desc=document.getElementById("websitePrompt").value.trim()
if(!desc){alert("Enter prompt"); return;}
let count=parseInt(document.getElementById("employeeCount").value)
selectedWorkforce.employees=[]
let workspace=document.getElementById("workspaceArea")
workspace.innerHTML=""
for(let i=0;i<count;i++){
let role=selectedWorkforce.roles[i % selectedWorkforce.roles.length] || rolesList[i % rolesList.length]
let avatar=avatars[i % avatars.length]
let emp={role,avatar,x:20+ i*60, y:20, dx:0, dy:0, task:desc}
selectedWorkforce.employees.push(emp)
let img=document.createElement("img")
img.src=avatar
img.className="avatar"
img.style.left=emp.x+"px"
img.style.top=emp.y+"px"
workspace.appendChild(img)
emp.img=img
simulateEmployeeWork(emp)
}
renderEmployees()
generateWebsite(desc)
}

// Simulate each employee working
function simulateEmployeeWork(emp){
let steps=0
let interval=setInterval(()=>{
if(steps<20){
emp.img.style.top=parseInt(emp.img.style.top)+2+"px"
steps++
}else{
clearInterval(interval)
inboxLog(emp.role+" completed a task","Task: "+emp.task)
updateWebsitePreview(emp)
}
},100)
}

// Update preview live
function updateWebsitePreview(emp){
let iframe=document.getElementById("websitePreview")
let doc=iframe.contentDocument||iframe.contentWindow.document
if(!doc.body.innerHTML.includes(emp.task)){
doc.body.innerHTML+=`<section><h2>${emp.role}</h2><p>${emp.task}</p></section>`
}
}

// Display employees in management
function renderEmployees(){
let empContainer=document.getElementById("employees")
empContainer.innerHTML="<h3>Employees:</h3>"
selectedWorkforce.employees.forEach(e=>{
let div=document.createElement("div")
div.className="employee-card"
div.innerHTML=`<img class="avatar" src="${e.avatar}"> <b>${e.role}</b> Status: working`
empContainer.appendChild(div)
})
}

// Generate single-file website HTML
function generateWebsite(prompt){
websiteData.html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${selectedWorkforce.name}</title>
<style>
body{font-family:'Segoe UI',sans-serif;margin:0;padding:20px;background:#f9fafb;color:#1f2937;}
nav ul{list-style:none;display:flex;gap:20px;background:#4f46e5;padding:10px;border-radius:8px;color:white;}
nav li{cursor:pointer;color:white;padding:5px 10px;border-radius:6px;}
nav li:hover{background:#6366f1;}
section{margin-top:20px;background:white;padding:15px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
</style></head><body>
<h1>${prompt}</h1>
<nav><ul><li>Home</li><li>About</li><li>Services</li><li>Blog</li><li>Contact</li></ul></nav>
<section><h2>About</h2><p>Generated by '${selectedWorkforce.name}' AI Workforce.</p></section>
<section><h2>Services</h2><p>AI generated services based on: "${prompt}".</p></section>
<section><h2>Blog</h2><p>AI generated blog content: "${prompt}".</p></section>
<section><h2>Contact</h2><p>Email: contact@example.com</p></section>
</body></html>`
document.getElementById("websitePreview").srcdoc=websiteData.html
}

// Download single-file website
function downloadWebsite(){
if(!websiteData.html){alert("Build website first"); return;}
let a=document.createElement("a")
let blob=new Blob([websiteData.html],{type:"text/html"})
a.href=URL.createObjectURL(blob)
a.download=selectedWorkforce.name.replace(/\s+/g,"_")+".html"
a.click()
log("Website ready for download!")
}
</script>

</body>
</html>
