<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WorkForce Ai</title>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Segoe UI;
background:#0c0f1a;
color:white;
}

/* ===== AURORA TEXT ===== */

.aurora{
background:linear-gradient(90deg,#3b82f6,#ec4899,#3b82f6);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:aurora 6s infinite linear;
}

@keyframes aurora{
0%{background-position:0%}
100%{background-position:200%}
}

/* ===== TOP NAV ===== */

.topnav{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 30px;
background:#0b1020;
border-bottom:1px solid #1f2937;
}

.navlinks{
display:flex;
gap:30px;
}

.navlinks div{
cursor:pointer;
opacity:.8;
}

.navlinks div:hover{
opacity:1;
}

/* ===== LAYOUT ===== */

.container{
padding:40px;
}

/* ===== CARDS ===== */

.card{
background:#12172b;
padding:25px;
border-radius:12px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

/* ===== INPUTS ===== */

textarea,input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
background:#1a2040;
color:white;
}

button{
background:linear-gradient(90deg,#3b82f6,#ec4899);
border:none;
padding:12px 20px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

/* ===== EMPLOYEE GRID ===== */

.employee-grid{
display:grid;
grid-template-columns:repeat(auto-fill,150px);
gap:20px;
}

.employee{
background:#1a2040;
border-radius:12px;
padding:15px;
text-align:center;
cursor:pointer;
}

.employee img{
width:70px;
height:70px;
border-radius:50%;
margin-bottom:10px;
}

/* ===== WORKFORCE ===== */

.employee-card{
display:flex;
align-items:center;
gap:15px;
margin-bottom:15px;
background:#1a2040;
padding:10px;
border-radius:10px;
}

.employee-card img{
width:45px;
border-radius:50%;
}

/* ===== INBOX ===== */

.email{
background:#1a2040;
padding:10px;
border-radius:8px;
margin-bottom:10px;
cursor:pointer;
}

/* ===== WEBSITE PREVIEW ===== */

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
background:white;
}

</style>
</head>

<body>

<!-- TOP NAV -->

<div class="topnav">

<h2 class="aurora">AI Workforce Builder</h2>

<div class="navlinks">
<div onclick="show('dashboard')">Dashboard</div>
<div onclick="show('workforce')">Workforce</div>
<div onclick="show('inbox')">Inbox</div>
<div onclick="show('builder')">Website Builder</div>
</div>

</div>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<div class="card">

<h2 class="aurora">Build Websites With Your AI Workforce</h2>

<p>Describe the website you want and your AI employees will build it.</p>

</div>

</div>

<!-- WEBSITE BUILDER -->

<div id="builder" class="page" style="display:none">

<div class="card">

<h3>Describe your website</h3>

<textarea id="prompt" rows="4"
placeholder="Example: A modern coffee shop website with menu, blog and online ordering"></textarea>

<h3>Choose employees</h3>

<div class="employee-grid">

<div class="employee" onclick="selectRole('designer')">
<img src="https://cdn-icons-png.flaticon.com/512/921/921347.png">
Designer
</div>

<div class="employee" onclick="selectRole('writer')">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
Writer
</div>

<div class="employee" onclick="selectRole('seo')">
<img src="https://cdn-icons-png.flaticon.com/512/4248/4248443.png">
SEO
</div>

<div class="employee" onclick="selectRole('builder')">
<img src="https://cdn-icons-png.flaticon.com/512/2620/2620971.png">
Builder
</div>

<div class="employee" onclick="selectRole('analytics')">
<img src="https://cdn-icons-png.flaticon.com/512/4149/4149677.png">
Analytics
</div>

</div>

<button onclick="buildWebsite()">Build Website</button>

</div>

<div class="card">

<h3>Website Preview</h3>

<iframe id="preview"></iframe>

<button onclick="downloadSite()">Download Website</button>

</div>

</div>

<!-- WORKFORCE -->

<div id="workforce" class="page" style="display:none">

<div class="card">

<h3>Your AI Employees</h3>

<div id="employees"></div>

</div>

</div>

<!-- INBOX -->

<div id="inbox" class="page" style="display:none">

<div class="card">

<h3>Inbox</h3>

<div id="emails"></div>

</div>

</div>

</div>

<script>

/* ===== NAVIGATION ===== */

function show(id){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")

document.getElementById(id).style.display="block"

}

/* ===== EMPLOYEE SYSTEM ===== */

let roles=[]
let siteHTML=""

function selectRole(role){

if(!roles.includes(role))
roles.push(role)

}

/* ===== INBOX ===== */

function sendEmail(title,message){

let div=document.createElement("div")
div.className="email"
div.innerHTML="<b>"+title+"</b><br>"+message

document.getElementById("emails").prepend(div)

}

/* ===== WORKFORCE DISPLAY ===== */

function renderEmployees(){

let container=document.getElementById("employees")

container.innerHTML=""

roles.forEach(r=>{

let icon={
designer:"https://cdn-icons-png.flaticon.com/512/921/921347.png",
writer:"https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
seo:"https://cdn-icons-png.flaticon.com/512/4248/4248443.png",
builder:"https://cdn-icons-png.flaticon.com/512/2620/2620971.png",
analytics:"https://cdn-icons-png.flaticon.com/512/4149/4149677.png"
}[r]

let div=document.createElement("div")
div.className="employee-card"

div.innerHTML="<img src='"+icon+"'>"+r

container.appendChild(div)

})

}

/* ===== WEBSITE GENERATION ===== */

function buildWebsite(){

let prompt=document.getElementById("prompt").value

renderEmployees()

sendEmail("AI Builder","Building website based on prompt")

siteHTML=`

<!DOCTYPE html>
<html>
<head>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f9fafb;
color:#111;
}

header{
background:linear-gradient(90deg,#3b82f6,#ec4899);
color:white;
padding:40px;
text-align:center;
}

nav{
background:#111;
color:white;
padding:10px;
display:flex;
gap:20px;
justify-content:center;
}

section{
padding:40px;
}

.card{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<header>
<h1>${prompt}</h1>
<p>Built by AI Workforce</p>
</header>

<nav>
Home
About
Services
Blog
Contact
</nav>

<section>

<div class="card">
<h2>About</h2>
<p>This website was generated from the prompt:</p>
<p><b>${prompt}</b></p>
</div>

<div class="card">
<h2>Services</h2>
<p>AI generated services for your business.</p>
</div>

<div class="card">
<h2>Blog</h2>
<p>Future blog posts generated by AI employees.</p>
</div>

<div class="card">
<h2>Contact</h2>
<p>Email: contact@example.com</p>
</div>

</section>

</body>
</html>

`

document.getElementById("preview").srcdoc=siteHTML

sendEmail("Designer","Layout created")
sendEmail("Writer","Content generated")
sendEmail("SEO","Metadata optimized")

}

/* ===== DOWNLOAD ===== */

function downloadSite(){

let a=document.createElement("a")

let blob=new Blob([siteHTML],{type:"text/html"})

a.href=URL.createObjectURL(blob)

a.download="ai-website.html"

a.click()

}

</script>

</body>
</html>
