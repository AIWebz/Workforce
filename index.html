<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Workforce</title>

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:#0f1222;
color:white;
}

.topbar{
height:60px;
display:flex;
align-items:center;
padding:0 30px;
background:#0a0d1c;
border-bottom:1px solid #1e2240;
}

.topbar h2{
margin:0;
}

.layout{
display:flex;
height:calc(100vh - 60px);
}

.pages{
width:180px;
background:#0a0d1c;
padding:20px;
border-right:1px solid #1e2240;
}

.components{
width:220px;
background:#0a0d1c;
padding:20px;
border-right:1px solid #1e2240;
overflow:auto;
}

.canvas{
flex:1;
background:#15183a;
padding:20px;
overflow:auto;
}

.preview{
width:350px;
background:white;
color:black;
}

.console{
height:200px;
background:#0a0d1c;
border-top:1px solid #1e2240;
padding:10px;
overflow:auto;
}

.block{
background:#1d214a;
padding:8px;
margin-bottom:6px;
cursor:pointer;
}

.page{
padding:6px;
cursor:pointer;
}

button{
padding:8px 12px;
margin-top:6px;
}

</style>
</head>

<body>

<div class="topbar">
<h2>AI Builder Pro</h2>
</div>

<div class="layout">

<div class="pages">

<h3>Pages</h3>

<div class="page" onclick="loadPage('home')">Home</div>
<div class="page" onclick="loadPage('about')">About</div>
<div class="page" onclick="loadPage('contact')">Contact</div>

<button onclick="addPage()">Add Page</button>

</div>

<div class="components">

<h3>Components</h3>

<div class="block" onclick="addComponent('hero')">Hero</div>
<div class="block" onclick="addComponent('features')">Features</div>
<div class="block" onclick="addComponent('gallery')">Gallery</div>
<div class="block" onclick="addComponent('pricing')">Pricing</div>
<div class="block" onclick="addComponent('testimonials')">Testimonials</div>
<div class="block" onclick="addComponent('faq')">FAQ</div>
<div class="block" onclick="addComponent('contact')">Contact Form</div>

</div>

<div class="canvas" id="canvas">

<h2>Start building</h2>

</div>

<div class="preview">
<iframe id="preview" style="width:100%;height:100%;border:none"></iframe>
</div>

</div>

<div class="console" id="console">

AI Console Ready

</div>

<script>

let pages={
home:"",
about:"",
contact:""
}

let current="home"

function loadPage(name){

current=name

canvas.innerHTML=pages[name]

updatePreview()

}

function addPage(){

let name=prompt("Page name")

pages[name]=""

let div=document.createElement("div")

div.innerText=name

div.className="page"

div.onclick=()=>loadPage(name)

document.querySelector(".pages").appendChild(div)

}

function addComponent(type){

let html=""

if(type=="hero")
html="<section><h1>Hero Section</h1><p>Welcome</p></section>"

if(type=="features")
html="<section><h2>Features</h2><ul><li>Feature</li></ul></section>"

if(type=="gallery")
html="<section><h2>Gallery</h2><img src='https://picsum.photos/300'></section>"

if(type=="pricing")
html="<section><h2>Pricing</h2><p>$29/mo</p></section>"

if(type=="testimonials")
html="<section><h2>Testimonials</h2><p>Great service!</p></section>"

if(type=="faq")
html="<section><h2>FAQ</h2><p>Common questions</p></section>"

if(type=="contact")
html="<section><h2>Contact</h2><input placeholder='Email'></section>"

canvas.innerHTML+=html

pages[current]=canvas.innerHTML

updatePreview()

analyzeCode()

}

function updatePreview(){

preview.srcdoc=canvas.innerHTML

}

function analyzeCode(){

let code=canvas.innerHTML

let report="QA Agent Report:\n"

if(!code.includes("</section>"))
report+="Warning: missing closing section tag\n"

if(code.length<50)
report+="Page looks empty\n"

document.getElementById("console").innerText=report

}

</script>

</body>
</html>
